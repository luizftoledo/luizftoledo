<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍺 Cerveja & Calorias</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: #888;
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Drink buttons */
    .drinks-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .drink-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 14px 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #f0f0f0;
    }

    .drink-btn:hover {
      background: #222;
      border-color: #f5a623;
      transform: translateY(-2px);
    }

    .drink-btn:active { transform: translateY(0); }

    .drink-btn .emoji { font-size: 1.8rem; }
    .drink-btn .name { font-size: 0.72rem; color: #aaa; text-align: center; line-height: 1.3; }
    .drink-btn .kcal { font-size: 0.78rem; font-weight: 600; color: #f5a623; }

    /* Summary card */
    .summary {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 24px;
    }

    .summary-empty {
      text-align: center;
      color: #555;
      font-size: 0.95rem;
      padding: 8px 0;
    }

    .total-kcal {
      font-size: 3rem;
      font-weight: 800;
      color: #f5a623;
      text-align: center;
      line-height: 1;
    }

    .total-kcal span {
      font-size: 1rem;
      font-weight: 400;
      color: #888;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .stat {
      background: #111;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .stat .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #666;
      margin-bottom: 6px;
    }

    .stat .value {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .stat.fat .value  { color: #ff6b6b; }
    .stat.run .value  { color: #51cf66; }
    .stat.bike .value { color: #339af0; }
    .stat.walk .value { color: #cc5de8; }

    /* Log */
    .log {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .log-header h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: #ff6b6b; }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 260px;
      overflow-y: auto;
    }

    .log-item {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-item .drink-info { display: flex; align-items: center; gap: 10px; }
    .log-item .drink-info .em { font-size: 1.2rem; }
    .log-item .drink-info .nm { font-size: 0.85rem; }
    .log-item .drink-kcal { font-size: 0.85rem; font-weight: 600; color: #f5a623; }

    .log-item .remove-btn {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 0 0 12px;
      transition: color 0.15s;
    }

    .log-item .remove-btn:hover { color: #ff6b6b; }

    /* Motivational message */
    .message {
      text-align: center;
      font-size: 0.95rem;
      color: #888;
      padding: 4px 0;
      min-height: 1.4em;
      transition: all 0.3s;
    }

    .message.warn { color: #f5a623; }
    .message.danger { color: #ff6b6b; }

    footer {
      margin-top: 40px;
      color: #444;
      font-size: 0.75rem;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>🍺 Cerveja & Calorias</h1>
  <p>Adicione o que bebeu e veja o estrago</p>
</header>

<div class="container">

  <!-- Drink buttons -->
  <div class="drinks-grid" id="drinksGrid"></div>

  <!-- Summary -->
  <div class="summary" id="summary">
    <div class="summary-empty" id="emptyMsg">Toque em uma bebida para começar 👆</div>
    <div id="summaryContent" style="display:none">
      <div class="total-kcal" id="totalKcal">0 <span>kcal</span></div>
      <div class="message" id="message"></div>
      <div class="stats">
        <div class="stat fat">
          <div class="label">🫀 Gordura acumulada</div>
          <div class="value" id="statFat">—</div>
        </div>
        <div class="stat run">
          <div class="label">🏃 Correndo</div>
          <div class="value" id="statRun">—</div>
        </div>
        <div class="stat bike">
          <div class="label">🚴 De bike</div>
          <div class="value" id="statBike">—</div>
        </div>
        <div class="stat walk">
          <div class="label">🚶 Caminhando</div>
          <div class="value" id="statWalk">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Log -->
  <div class="log" id="logSection" style="display:none">
    <div class="log-header">
      <h2>O que você tomou</h2>
      <button class="clear-btn" onclick="clearAll()">limpar tudo</button>
    </div>
    <div class="log-list" id="logList"></div>
  </div>

</div>

<footer>1 kg de gordura ≈ 7700 kcal · Corrida ~600 kcal/h · Bike ~500 kcal/h · Caminhada ~300 kcal/h</footer>

<script>
  const DRINKS = [
    { emoji: '🍺', name: 'Cerveja lata\n350ml', kcal: 150 },
    { emoji: '🍺', name: 'Long neck\n355ml', kcal: 155 },
    { emoji: '🍺', name: 'Litrão\n1L', kcal: 430 },
    { emoji: '🍻', name: 'Cerveja 600ml\ngelada', kcal: 250 },
    { emoji: '🥂', name: 'Vinho\ntaça 150ml', kcal: 125 },
    { emoji: '🍷', name: 'Vinho tinto\ntaça 150ml', kcal: 130 },
    { emoji: '🥃', name: 'Whisky\ndose 50ml', kcal: 120 },
    { emoji: '🍸', name: 'Caipirinha\n1 copo', kcal: 200 },
    { emoji: '🍹', name: 'Drinks\ncom suco', kcal: 180 },
    { emoji: '🥤', name: 'Vodka\ndose 50ml', kcal: 100 },
    { emoji: '🍶', name: 'Cachaça\ndose 50ml', kcal: 110 },
    { emoji: '🍾', name: 'Espumante\ntaça 150ml', kcal: 120 },
  ];

  const MESSAGES = [
    { min: 0,    max: 100,  cls: '',       text: 'Praticamente água. Continue assim! 💧' },
    { min: 100,  max: 300,  cls: '',       text: 'Moderado. Tudo bem por hoje! 😊' },
    { min: 300,  max: 500,  cls: 'warn',   text: 'Tá ficando salgado… sinal amarelo. 🟡' },
    { min: 500,  max: 800,  cls: 'warn',   text: 'Amanhã você vai acordar pesado. 😅' },
    { min: 800,  max: 1200, cls: 'danger', text: 'Isso vai virar currículo na balança. 😬' },
    { min: 1200, max: 9999, cls: 'danger', text: 'Você transformou cerveja em gordura. 🫠' },
  ];

  let log = [];

  // Build drink buttons
  const grid = document.getElementById('drinksGrid');
  DRINKS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'drink-btn';
    btn.innerHTML = `
      <span class="emoji">${d.emoji}</span>
      <span class="name">${d.name.replace('\n', '<br>')}</span>
      <span class="kcal">${d.kcal} kcal</span>
    `;
    btn.onclick = () => addDrink(i);
    grid.appendChild(btn);
  });

  function addDrink(idx) {
    log.push({ ...DRINKS[idx], id: Date.now() + Math.random() });
    render();
  }

  function removeDrink(id) {
    log = log.filter(d => d.id !== id);
    render();
  }

  function clearAll() {
    log = [];
    render();
  }

  function fmtMin(minutes) {
    if (minutes < 60) return `${Math.round(minutes)} min`;
    const h = Math.floor(minutes / 60);
    const m = Math.round(minutes % 60);
    return m > 0 ? `${h}h ${m}min` : `${h}h`;
  }

  function render() {
    const total = log.reduce((s, d) => s + d.kcal, 0);
    const isEmpty = log.length === 0;

    document.getElementById('emptyMsg').style.display = isEmpty ? '' : 'none';
    document.getElementById('summaryContent').style.display = isEmpty ? 'none' : '';
    document.getElementById('logSection').style.display = isEmpty ? 'none' : '';

    if (isEmpty) return;

    // Total
    document.getElementById('totalKcal').innerHTML = `${total.toLocaleString('pt-BR')} <span>kcal</span>`;

    // Fat gain: 7700 kcal = 1kg
    const fatGrams = (total / 7700) * 1000;
    document.getElementById('statFat').textContent =
      fatGrams < 1000 ? `${Math.round(fatGrams)} g` : `${(fatGrams / 1000).toFixed(2)} kg`;

    // Cardio to burn
    document.getElementById('statRun').textContent  = fmtMin(total / 10);   // 600 kcal/h = 10/min
    document.getElementById('statBike').textContent = fmtMin(total / 8.33); // 500 kcal/h
    document.getElementById('statWalk').textContent = fmtMin(total / 5);    // 300 kcal/h

    // Message
    const msg = MESSAGES.find(m => total >= m.min && total < m.max);
    const msgEl = document.getElementById('message');
    msgEl.textContent = msg ? msg.text : '';
    msgEl.className = 'message ' + (msg ? msg.cls : '');

    // Log list
    const listEl = document.getElementById('logList');
    listEl.innerHTML = '';
    [...log].reverse().forEach(d => {
      const item = document.createElement('div');
      item.className = 'log-item';
      item.innerHTML = `
        <div class="drink-info">
          <span class="em">${d.emoji}</span>
          <span class="nm">${d.name.replace('\n', ' ')}</span>
        </div>
        <span class="drink-kcal">${d.kcal} kcal</span>
        <button class="remove-btn" onclick="removeDrink(${d.id})">✕</button>
      `;
      listEl.appendChild(item);
    });
  }
</script>
</body>
</html>
